<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCart — Fresh Groceries Delivered</title>
  <meta name="description" content="FreshCart — Browse fresh groceries, add to cart, and get them delivered to your door in 30-45 minutes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Top notification bar -->
  <div class="top-bar">
    <span>🚚 Free delivery on orders over $35!</span>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" id="nav-logo" onclick="app.navigate('home'); return false;">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Fresh<span class="logo-accent">Cart</span></span>
      </a>

      <div class="nav-search" id="nav-search">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search for groceries..." autocomplete="off">
        <button class="search-clear" id="search-clear" onclick="app.clearSearch()">✕</button>
      </div>

      <div class="nav-actions">
        <button class="nav-btn cart-btn" id="cart-btn" onclick="app.navigate('cart')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cart-badge">0</span>
        </button>
        <button class="nav-btn orders-btn" id="orders-btn" onclick="app.navigate('orders')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main content area -->
  <main class="main-content" id="main-content">
    <!-- Content is rendered dynamically by JavaScript -->
    <div class="page-loader" id="page-loader">
      <div class="loader-spinner"></div>
      <p>Loading fresh groceries...</p>
    </div>
  </main>

  <!-- Toast notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/pages.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
